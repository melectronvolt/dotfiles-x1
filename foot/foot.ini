font=JetBrainsMono Nerd Font:size=8
dpi-aware=yes
pad=8x8
initial-window-size-chars=100x32
bold-text-in-bright=no

[cursor]
style=beam
color=1a1a1a f9e2af
blink=yes

[mouse]
hide-when-typing=yes

[scrollback]
lines=10000

[key-bindings]
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
search-start=Control+Shift+r
font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0

[colors]
alpha=0.97
foreground=e4e4e4
background=1a1a1a
selection-foreground=1a1a1a
selection-background=f9e2af

regular0=3a3a3a
regular1=f38ba8
regular2=a6e3a1
regular3=f9e2af
regular4=89b4fa
regular5=f5c2e7
regular6=94e2d5
regular7=bac2de

bright0=5a5a5a
bright1=f38ba8
bright2=a6e3a1
bright3=f9e2af
bright4=89b4fa
bright5=f5c2e7
bright6=94e2d5
bright7=c8c8c8
